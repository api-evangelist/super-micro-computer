  - IPMI
  - Fortune 500
  - Infrastructure
  - Cloud
apis:
  - aid: super-micro-computer:redfish-api
    name: Supermicro Redfish API
    description: >-
      Supermicro's implementation of the DMTF Redfish RESTful API standard for
      out-of-band server management via BMC. Provides programmatic access to server
      health monitoring, power management, BIOS/BMC firmware updates, storage configuration,
      network configuration, user account management, and event logging across Supermicro
      server platforms.
    humanURL: https://www.supermicro.com/en/solutions/management-software/redfish
    baseURL: https://{bmc-ip}/redfish/v1
