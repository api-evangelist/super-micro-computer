aid: super-micro-computer
name: Super Micro Computer
description: >-
  Super Micro Computer (Supermicro) is a global leader in high-performance, high-efficiency
  server technology and innovation, providing complete server, storage, and networking
  solutions for data center, cloud, AI, and edge applications. Supermicro exposes
  its server management capabilities through the DMTF Redfish RESTful API standard,
  enabling programmatic management of servers, storage, and networking hardware via BMC.
url: >-
  https://raw.githubusercontent.com/api-evangelist/super-micro-computer/refs/heads/main/apis.yml
created: '2026-03-21'
modified: '2026-05-02'
specificationVersion: '0.19'
